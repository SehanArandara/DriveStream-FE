name: 🚀 DriveStream CI/CD Pipeline - Frontend

on:
  push:
    branches: [main, develop, cicd-pipeline]
  pull_request:
    branches: [main, develop, cicd-pipeline]

# ─────────────────────────────
# GLOBAL CACHE CONFIG IDEA
# ─────────────────────────────
env:
  NODE_ENV: production

jobs:

# ─────────────────────────────
# 1. INSTALL (FAST + CACHED)
# ─────────────────────────────
  install:
    name: 📦 Install Dependencies
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies (optimized)
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            node-modules-${{ runner.os }}-

# ─────────────────────────────
# 2. LINT (FAST - PARALLEL READY)
# ─────────────────────────────
  lint:
    name: 🔍 Lint Check
    runs-on: ubuntu-latest
    needs: install
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Run ESLint
        run: npm run lint || true

# ─────────────────────────────
# 3. TEST (FAST + PARALLEL READY)
# ─────────────────────────────
  test:
    name: 🧪 Tests & Coverage
    runs-on: ubuntu-latest
    needs: install

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Run tests
        run: npm run test -- --run

      - name: Coverage (non-blocking)
        run: npm run test -- --run --coverage
        continue-on-error: true

# ─────────────────────────────
# 4. BUILD (DEPENDS ON LINT + TEST)
# ─────────────────────────────
  build:
    name: 🏗️ Build App
    runs-on: ubuntu-latest
    needs: [lint, test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Build project
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: dist/
          retention-days: 5

# ─────────────────────────────
# 5. DOCKER (ONLY MAIN BRANCH)
# ─────────────────────────────
  docker:
    name: 🐳 Docker Build & Push
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/drivestream-fe:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

# ─────────────────────────────
# 6. APPROVAL GATE
# ─────────────────────────────
  approval:
    name: 🔐 Approval Gate
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main'
    environment:
      name: production

    steps:
      - name: Approval
        run: echo "Production approved"

# ─────────────────────────────
# 7. DEPLOY (NETLIFY)
# ─────────────────────────────
  deploy:
    name: 🚀 Deploy to Netlify
    runs-on: ubuntu-latest
    needs: approval
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: dist/

      - name: Deploy (no install CLI needed)
        run: npx netlify deploy --prod --dir=dist --no-build
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

# ─────────────────────────────
# 8. NOTIFY TEAMS (FAST)
# ─────────────────────────────
  notify:
    name: 📢 Notify Teams
    runs-on: ubuntu-latest
    needs: [deploy]
    if: always()

    steps:
      - name: Generate status
        id: status
        run: |
          if [ "${{ needs.deploy.result }}" == "success" ]; then
            echo "emoji=✅" >> $GITHUB_OUTPUT
            echo "status=SUCCESS" >> $GITHUB_OUTPUT
            echo "message=Frontend deployed successfully" >> $GITHUB_OUTPUT
          else
            echo "emoji=❌" >> $GITHUB_OUTPUT
            echo "status=FAILED" >> $GITHUB_OUTPUT
            echo "message=Deployment failed" >> $GITHUB_OUTPUT
          fi

      - name: Send Teams Notification
        run: |
          curl -X POST "${{ secrets.TEAMS_WEBHOOK_URL }}" \
          -H "Content-Type: application/json" \
          -d "{
            \"text\": \"${{ steps.status.outputs.emoji }} DriveStream Frontend: ${{ steps.status.outputs.status }} - ${{ steps.status.outputs.message }}\"
          }"