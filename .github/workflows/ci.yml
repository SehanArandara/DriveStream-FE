name: 🚀 DriveStream Frontend Pipeline

on:
  push:
    branches: [main, develop, cicd-pipeline]

  pull_request:
    branches: [main, develop, cicd-pipeline]

concurrency:
  group: frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ─────────────────────────────
  # COMMON CI PIPELINE
  # ─────────────────────────────
  ci:
    uses: NADUNSANDEEPA/DriveStream-CommonCICD/.github/workflows/common.yml@main

    with:
      node_version: "24"
      image_name: drivestream-fe
      test_command: npm run test -- --run
      build_command: npm run build

    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

  # ─────────────────────────────
  # DEPLOY FRONTEND
  # ─────────────────────────────
  deploy:
    name: 🚀 Deploy to Netlify
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Netlify CLI
        run: npm install -g netlify-cli

      - name: Build Frontend
        run: npm install && npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}

      - name: Deploy to Netlify
        run: netlify deploy --prod --dir=dist --no-build
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

  # ─────────────────────────────
  # NOTIFY TEAMS
  # ─────────────────────────────
  notify:
    name: 📢 Notify Teams
    runs-on: ubuntu-latest
    needs: deploy

    if: always()

    steps:
      - name: Send Teams Notification
        env:
          TEAMS_WEBHOOK: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: |
          if [[ "${{ needs.deploy.result }}" == "success" ]]; then
            STATUS="SUCCESS"
            COLOR="00FF00"
            ICON="✅"
          else
            STATUS="FAILED"
            COLOR="FF0000"
            ICON="❌"
          fi

          curl -H "Content-Type: application/json" \
          -d "{
            \"@type\": \"MessageCard\",
            \"@context\": \"https://schema.org/extensions\",
            \"themeColor\": \"$COLOR\",
            \"summary\": \"Frontend Deployment\",

            \"sections\": [{
              \"activityTitle\": \"$ICON Frontend Deployment $STATUS\",

              \"facts\": [
                {
                  \"name\": \"Repository\",
                  \"value\": \"${{ github.repository }}\"
                },
                {
                  \"name\": \"Branch\",
                  \"value\": \"${{ github.ref_name }}\"
                },
                {
                  \"name\": \"Triggered By\",
                  \"value\": \"${{ github.actor }}\"
                }
              ],

              \"markdown\": true
            }]
          }" \
          $TEAMS_WEBHOOK