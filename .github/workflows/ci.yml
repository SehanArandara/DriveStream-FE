name: 🚀 React CI/CD Pipeline

on:
  push:
    branches: [main, develop, cicd-pipeline]

  pull_request:
    branches: [main, develop, cicd-pipeline]

env:
  IMAGE_NAME: drivestream-fe

jobs:

  # ─────────────────────────────
  # 1. INSTALL DEPENDENCIES
  # ─────────────────────────────
  install:
    name: 📦 Install Dependencies
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm install

      - name: Cache node_modules
        uses: actions/cache/save@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

  # ─────────────────────────────
  # 2. LINT CHECK
  # ─────────────────────────────
  lint:
    name: 🔍 ESLint Check
    runs-on: ubuntu-latest
    needs: install
    continue-on-error: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Run ESLint
        run: |
          npm run lint || echo "Lint issues found but pipeline continues"

  # ─────────────────────────────
  # 3. TESTS + COVERAGE
  # ─────────────────────────────
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest
    needs: install

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Execute Tests
        run: |
          npm run test -- --run || echo "Tests skipped"

      - name: Generate Coverage
        run: |
          npm run test -- --run --coverage || echo "Coverage skipped"

  # ─────────────────────────────
  # 4. BUILD APPLICATION
  # ─────────────────────────────
  build:
    name: 🏗️ Build React App
    runs-on: ubuntu-latest
    needs: [lint, test]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Build Project
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: dist/
          retention-days: 7

  # ─────────────────────────────
  # 5. DOCKER BUILD & PUSH
  # ─────────────────────────────
  docker:
    name: 🐳 Docker Build & Push
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker Hub Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Generate Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build & Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
            VITE_GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }}

  # ─────────────────────────────
  # 6. MANUAL APPROVAL
  # ─────────────────────────────
  approval:
    name: 🔐 Production Approval
    runs-on: ubuntu-latest
    needs: docker

    environment:
      name: production

    steps:
      - name: ✅ Approval Granted
        run: echo "Deployment approved"

      - name: 💬 Add PR Comment
        uses: actions/github-script@v7
        with:
          script: |
            const issue_number = context.payload.pull_request?.number;

            if (!issue_number) {
              core.info("No PR found. Skipping comment.");
              return;
            }

            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue_number,
              body: "✅ Production deployment approved."
            });

  # ─────────────────────────────
  # 7. DEPLOY TO NETLIFY
  # ─────────────────────────────
  deploy:
    name: 🚀 Deploy to Netlify
    runs-on: ubuntu-latest
    needs: approval

    steps:
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: dist/

      - name: Install Netlify CLI
        run: npm install -g netlify-cli

      - name: Deploy Application
        run: netlify deploy --prod --dir=dist --no-build
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

  # ─────────────────────────────
  # 8. MICROSOFT TEAMS NOTIFICATION
  # ─────────────────────────────
  notify-teams:
    name: 📢 Notify Teams Channel
    runs-on: ubuntu-latest

    needs:
      - install
      - lint
      - test
      - build
      - docker
      - approval
      - deploy

    if: always()

    steps:
      - name: 📊 Prepare Notification Data
        id: status
        run: |

          if [[ "${{ needs.deploy.result }}" == "success" ]]; then
            echo "STATUS=SUCCESS" >> $GITHUB_ENV
            echo "ICON=✅" >> $GITHUB_ENV
            echo "COLOR=00FF00" >> $GITHUB_ENV
            echo "MESSAGE=DriveStream deployed successfully to production." >> $GITHUB_ENV
          else
            echo "STATUS=FAILED" >> $GITHUB_ENV
            echo "ICON=❌" >> $GITHUB_ENV
            echo "COLOR=FF0000" >> $GITHUB_ENV
            echo "MESSAGE=DriveStream deployment failed." >> $GITHUB_ENV
          fi

          echo "SHORT_SHA=$(echo '${{ github.sha }}' | cut -c1-7)" >> $GITHUB_ENV
          echo "DATE=$(TZ='Asia/Colombo' date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_ENV

      - name: 📢 Send Teams Notification
        env:
          TEAMS_WEBHOOK: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: |

          REPO="${{ github.repository }}"
          BRANCH="${{ github.ref_name }}"
          ACTOR="${{ github.actor }}"
          WORKFLOW="${{ github.workflow }}"
          RUN_NUMBER="${{ github.run_number }}"
          RUN_ID="${{ github.run_id }}"

          WORKFLOW_URL="https://github.com/${REPO}/actions/runs/${RUN_ID}"
          COMMIT_URL="https://github.com/${REPO}/commit/${{ github.sha }}"

          curl -H "Content-Type: application/json" \
          -d "{
            \"@type\": \"MessageCard\",
            \"@context\": \"https://schema.org/extensions\",
            \"themeColor\": \"$COLOR\",
            \"summary\": \"React CI/CD Pipeline\",

            \"sections\": [
              {
                \"activityTitle\": \"$ICON React CI/CD Pipeline $STATUS\",
                \"activitySubtitle\": \"$MESSAGE\",

                \"facts\": [

                  {
                    \"name\": \"📦 Repository\",
                    \"value\": \"$REPO\"
                  },

                  {
                    \"name\": \"🌿 Branch\",
                    \"value\": \"$BRANCH\"
                  },

                  {
                    \"name\": \"👤 Triggered By\",
                    \"value\": \"$ACTOR\"
                  },

                  {
                    \"name\": \"🔄 Workflow\",
                    \"value\": \"$WORKFLOW\"
                  },

                  {
                    \"name\": \"🔢 Run Number\",
                    \"value\": \"#$RUN_NUMBER\"
                  },

                  {
                    \"name\": \"🐳 Docker Image\",
                    \"value\": \"${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest\"
                  },

                  {
                    \"name\": \"📝 Commit Message\",
                    \"value\": \"${{ github.event.head_commit.message }}\"
                  },

                  {
                    \"name\": \"🔖 Commit SHA\",
                    \"value\": \"$SHORT_SHA\"
                  },

                  {
                    \"name\": \"🚀 Environment\",
                    \"value\": \"Production\"
                  },

                  {
                    \"name\": \"🕐 Sri Lanka Time\",
                    \"value\": \"$DATE\"
                  }

                ],

                \"markdown\": true
              }
            ],

            \"potentialAction\": [

              {
                \"@type\": \"OpenUri\",
                \"name\": \"🔍 View Workflow Logs\",
                \"targets\": [
                  {
                    \"os\": \"default\",
                    \"uri\": \"$WORKFLOW_URL\"
                  }
                ]
              },

              {
                \"@type\": \"OpenUri\",
                \"name\": \"🌐 Open Live Application\",
                \"targets\": [
                  {
                    \"os\": \"default\",
                    \"uri\": \"https://drivestreams.netlify.app\"
                  }
                ]
              },

              {
                \"@type\": \"OpenUri\",
                \"name\": \"📂 View Commit\",
                \"targets\": [
                  {
                    \"os\": \"default\",
                    \"uri\": \"$COMMIT_URL\"
                  }
                ]
              }

            ]
          }" \
          $TEAMS_WEBHOOK