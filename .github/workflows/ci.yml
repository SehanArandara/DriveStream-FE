name: React CI/CD Pipeline

on:
  push:
    branches: [main, develop, cicd-pipeline]
  pull_request:
    branches: [main, develop, cicd-pipeline]

jobs:
  # ─────────────────────────────
  # 1. INSTALL
  # ─────────────────────────────
  install:
    name: 📦 Install Dependencies
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Cache node_modules
        uses: actions/cache/save@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

  # ─────────────────────────────
  # 2. LINT (NON-BLOCKING)
  # ─────────────────────────────
  lint:
    name: 🔍 Lint
    runs-on: ubuntu-latest
    needs: install

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Run ESLint
        run: npm run lint
        continue-on-error: true

  # ─────────────────────────────
  # 3. TEST + COVERAGE
  # ─────────────────────────────
  test:
    name: 🧪 Test & 📊 Coverage
    runs-on: ubuntu-latest
    needs: install

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Run Tests
        run: npm run test -- --run

      - name: Run Coverage
        run: npm run test -- --run --coverage
        continue-on-error: true

  # ─────────────────────────────
  # 4. BUILD
  # ─────────────────────────────
  build:
    name: 🏗️ Build App
    runs-on: ubuntu-latest
    needs: [lint, test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Build project
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: dist/
          retention-days: 7

  # ─────────────────────────────
  # 5. DOCKER BUILD & PUSH
  # ─────────────────────────────
  docker:
    name: 🐳 Docker Build & Push
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/drivestream-fe
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
            VITE_GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }}

  # ─────────────────────────────
  # 6. MANUAL APPROVAL
  # ─────────────────────────────
  approval:
    name: 🔐 Approval Gate
    runs-on: ubuntu-latest
    needs: docker
    environment:
      name: production

    steps:
      - name: Approval Granted
        run: echo "Approved. Ready for deployment."

      - name: Post Approval Comment
        uses: actions/github-script@v7
        with:
          script: |
            const issue_number = context.payload.pull_request?.number;
            if (!issue_number) {
              core.info("No PR found. Skipping comment.");
              return;
            }
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue_number,
              body: "✅ Approval granted. Ready for production deployment."
            })

  # ─────────────────────────────
  # 7. DEPLOY
  # ─────────────────────────────
  deploy:
    name: 🚀 Deploy to Netlify
    runs-on: ubuntu-latest
    needs: approval

    steps:
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: dist/

      - name: Install Netlify CLI
        run: npm install -g netlify-cli

      - name: Deploy to Netlify
        run: netlify deploy --prod --dir=dist --no-build
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}


 # ─────────────────────────────
  # 8. MICROSOFT TEAMS NOTIFICATION
  # ─────────────────────────────
  notify-teams:
    name: 📢 Notify Teams Channel
    runs-on: ubuntu-latest
    needs:
      - install
      - lint
      - test
      - build
      - docker
      - approval
      - deploy

    if: always()

    steps:
      - name: Send Teams Notification
        env:
          TEAMS_WEBHOOK: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: |

          # ─────────────────────────────
          # PIPELINE STATUS
          # ─────────────────────────────
          if [[ "${{ needs.deploy.result }}" == "success" ]]; then
            STATUS="SUCCESS"
            COLOR="00FF00"
            ICON="✅"
          else
            STATUS="FAILED"
            COLOR="FF0000"
            ICON="❌"
          fi

          # ─────────────────────────────
          # BUILD DETAILS
          # ─────────────────────────────
          REPO="${{ github.repository }}"
          BRANCH="${{ github.ref_name }}"
          ACTOR="${{ github.actor }}"
          COMMIT_MESSAGE="${{ github.event.head_commit.message }}"
          COMMIT_SHA="${{ github.sha }}"
          SHORT_SHA=$(echo $COMMIT_SHA | cut -c1-7)

          WORKFLOW="${{ github.workflow }}"
          RUN_NUMBER="${{ github.run_number }}"
          RUN_ID="${{ github.run_id }}"

          IMAGE="${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest"

          WORKFLOW_URL="https://github.com/${REPO}/actions/runs/${RUN_ID}"
          COMMIT_URL="https://github.com/${REPO}/commit/${COMMIT_SHA}"

          DATE=$(date)

          # ─────────────────────────────
          # TEAMS MESSAGE PAYLOAD
          # ─────────────────────────────
          curl -H "Content-Type: application/json" \
          -d "{
            \"@type\": \"MessageCard\",
            \"@context\": \"https://schema.org/extensions\",
            \"themeColor\": \"$COLOR\",
            \"summary\": \"DriveStream CI/CD Pipeline\",

            \"sections\": [
              {
                \"activityTitle\": \"$ICON DriveStream Deployment $STATUS\",
                \"activitySubtitle\": \"GitHub Actions CI/CD Notification\",

                \"facts\": [
                  {
                    \"name\": \"📦 Repository\",
                    \"value\": \"$REPO\"
                  },
                  {
                    \"name\": \"🌿 Branch\",
                    \"value\": \"$BRANCH\"
                  },
                  {
                    \"name\": \"👤 Triggered By\",
                    \"value\": \"$ACTOR\"
                  },
                  {
                    \"name\": \"🔄 Workflow\",
                    \"value\": \"$WORKFLOW\"
                  },
                  {
                    \"name\": \"🆔 Run Number\",
                    \"value\": \"#$RUN_NUMBER\"
                  },
                  {
                    \"name\": \"🐳 Docker Image\",
                    \"value\": \"$IMAGE\"
                  },
                  {
                    \"name\": \"🚀 Environment\",
                    \"value\": \"Production\"
                  },
                  {
                    \"name\": \"📝 Commit\",
                    \"value\": \"$COMMIT_MESSAGE\"
                  },
                  {
                    \"name\": \"🔖 Commit SHA\",
                    \"value\": \"$SHORT_SHA\"
                  },
                  {
                    \"name\": \"⏰ Time\",
                    \"value\": \"$DATE\"
                  }
                ],

                \"markdown\": true
              }
            ],

            \"potentialAction\": [
              {
                \"@type\": \"OpenUri\",
                \"name\": \"🔍 View Workflow\",
                \"targets\": [
                  {
                    \"os\": \"default\",
                    \"uri\": \"$WORKFLOW_URL\"
                  }
                ]
              },
              {
                \"@type\": \"OpenUri\",
                \"name\": \"📝 View Commit\",
                \"targets\": [
                  {
                    \"os\": \"default\",
                    \"uri\": \"$COMMIT_URL\"
                  }
                ]
              }
            ]
          }" \
          $TEAMS_WEBHOOK