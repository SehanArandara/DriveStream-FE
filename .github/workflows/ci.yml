name: 🚀 DriveStream Frontend Pipeline

on:
  push:
    branches: [main, develop, cicd-pipeline]

  pull_request:
    branches: [main, develop, cicd-pipeline]

concurrency:
  group: frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ─────────────────────────────
  # CI PIPELINE
  # ─────────────────────────────
  ci:
    uses: NADUNSANDEEPA/DriveStream-CommonCICD/.github/workflows/common.yml@main

    with:
      node_version: "24"
      image_name: drivestream-fe
      test_command: npm run test -- --run
      build_command: npm run build

    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

  # ─────────────────────────────
  # DEPLOY
  # ─────────────────────────────
  deploy:
    name: 🚀 Deploy to Netlify
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Netlify CLI
        run: npm install -g netlify-cli

      - name: Build Frontend
        run: npm install && npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}

      - name: Deploy to Netlify
        run: netlify deploy --prod --dir=dist --no-build
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

  # ─────────────────────────────
  # NOTIFY
  # ─────────────────────────────
  notify:
    uses: NADUNSANDEEPA/DriveStream-CommonCICD/.github/workflows/common-notify.yml@main
    needs: deploy

    with:
      status: ${{ needs.deploy.result }}
      actor: ${{ github.actor }}
      branch: ${{ github.ref_name }}
      workflow_name: ${{ github.workflow }}
      run_number: ${{ github.run_number }}
      repository: ${{ github.repository }}
      commit_sha: ${{ github.sha }}

    secrets:
      TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}