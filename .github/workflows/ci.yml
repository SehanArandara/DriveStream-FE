name: React CI/CD Pipeline

on:
  push:
    branches: [main, develop, cicd-pipeline]
  pull_request:
    branches: [main, develop, cicd-pipeline]

jobs:
  # ─── Job 1: Install ───────────────────────────────────
  install:
    name: 📦 Install Dependencies
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}

  # ─── Job 2: Lint (NON-BLOCKING) ───────────────────────
  lint:
    name: 🔍 Lint
    runs-on: ubuntu-latest
    needs: install

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}

      - name: Run ESLint (non-blocking)
        run: npm run lint
        continue-on-error: true   # ✅ IMPORTANT FIX

  # ─── Job 3: Test ──────────────────────────────────────
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest
    needs: install

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}

      - name: Run Tests
        run: npm run test -- --run

  # ─── Job 4: Coverage ──────────────────────────────────
  coverage:
    name: 📊 Test Coverage
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}

      - name: Check Coverage
        run: npm run test -- --run --coverage
        continue-on-error: true

  # ─── Job 5: Build ─────────────────────────────────────
  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}

      - name: Build project
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: dist/
          retention-days: 7

  # ─── Job 6: Approval ──────────────────────────────────
  approval:
    name: 🔐 Waiting for Approval
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Manual Approval
        uses: trstringer/manual-approval@v1
        with:
          secret: ${{ github.TOKEN }}
          approvers: NADUNSANDEEPA
          minimum-approvals: 1
          issue-title: "🚀 Deployment Approval Required"
          issue-body: |
            ## Deployment Approval Request

            **Pipeline:** ${{ github.workflow }}
            **Branch:** ${{ github.ref_name }}
            **Commit:** ${{ github.sha }}
            **Triggered by:** ${{ github.actor }}

            ---
            ### ✅ Approve
            Comment: `approved`

            ### ❌ Reject
            Comment: `denied`

  # ─── Job 7: Deploy ────────────────────────────────────
  deploy:
    name: 🚀 Deploy to Netlify
    runs-on: ubuntu-latest
    needs: approval

    if: github.ref == 'refs/heads/main'

    steps:
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: dist/

      - name: Install Netlify CLI
        run: npm install -g netlify-cli

      - name: Deploy to Netlify
        run: netlify deploy --prod --dir=dist --no-build
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}