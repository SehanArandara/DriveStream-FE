name: React CI/CD Pipeline

on:
  push:
    branches: [main, develop, cicd-pipeline]
  pull_request:
    branches: [main, develop, cicd-pipeline]

jobs:
  # ─────────────────────────────
  # 1. INSTALL
  # ─────────────────────────────
  install:
    name: 📦 Install Dependencies
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Cache node_modules
        uses: actions/cache/save@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

  # ─────────────────────────────
  # 2. LINT (NON-BLOCKING)
  # ─────────────────────────────
  lint:
    name: 🔍 Lint
    runs-on: ubuntu-latest
    needs: install

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Run ESLint
        run: npm run lint
        continue-on-error: true

  # ─────────────────────────────
  # 3. TEST + COVERAGE
  # ─────────────────────────────
  test:
    name: 🧪 Test & 📊 Coverage
    runs-on: ubuntu-latest
    needs: install

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Run Tests
        run: npm run test -- --run

      - name: Run Coverage
        run: npm run test -- --run --coverage
        continue-on-error: true

  # ─────────────────────────────
  # 4. BUILD
  # ─────────────────────────────
  build:
    name: 🏗️ Build App
    runs-on: ubuntu-latest
    needs: [lint, test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Build project
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: dist/
          retention-days: 7

  # ─────────────────────────────
  # 5. DOCKER BUILD & PUSH
  # ─────────────────────────────
  docker:
    name: 🐳 Docker Build & Push
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/drivestream-fe
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
            VITE_GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }}

  # ─────────────────────────────
  # 6. MANUAL APPROVAL
  # ─────────────────────────────
  approval:
    name: 🔐 Approval Gate
    runs-on: ubuntu-latest
    needs: docker
    environment:
      name: production

    steps:
      - name: Approval Granted
        run: echo "Approved. Ready for deployment."

      - name: Post Approval Comment
        uses: actions/github-script@v7
        with:
          script: |
            const issue_number = context.payload.pull_request?.number;
            if (!issue_number) {
              core.info("No PR found. Skipping comment.");
              return;
            }
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue_number,
              body: "✅ Approval granted. Ready for production deployment."
            })

  # ─────────────────────────────
  # 7. DEPLOY
  # ─────────────────────────────
  deploy:
    name: 🚀 Deploy to Netlify
    runs-on: ubuntu-latest
    needs: approval

    steps:
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: dist/

      - name: Install Netlify CLI
        run: npm install -g netlify-cli

      - name: Deploy to Netlify
        run: netlify deploy --prod --dir=dist --no-build
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}


  # ─────────────────────────────
  # 8. NOTIFY TEAMS
  # ─────────────────────────────
  notify:
    name: 📢 Notify Teams
    runs-on: ubuntu-latest
    needs: deploy
    if: always()

    steps:
      - name: Set status info
        id: status
        run: |
          if [ "${{ needs.deploy.result }}" == "success" ]; then
            echo "emoji=✅" >> $GITHUB_OUTPUT
            echo "title=Deployment Successful" >> $GITHUB_OUTPUT
            echo "color=Good" >> $GITHUB_OUTPUT
            echo "message=The app is live and running on production." >> $GITHUB_OUTPUT
          else
            echo "emoji=❌" >> $GITHUB_OUTPUT
            echo "title=Deployment Failed" >> $GITHUB_OUTPUT
            echo "color=Attention" >> $GITHUB_OUTPUT
            echo "message=Something went wrong. Please check the logs immediately." >> $GITHUB_OUTPUT
          fi

      - name: Send Teams Adaptive Card
        run: |
          curl -X POST "${{ secrets.TEAMS_WEBHOOK_URL }}" \
          -H "Content-Type: application/json" \
          -d '{
            "type": "message",
            "attachments": [
              {
                "contentType": "application/vnd.microsoft.card.adaptive",
                "content": {
                  "$schema": "http://adaptivecards.io/schemas/adaptive-card.json",
                  "type": "AdaptiveCard",
                  "version": "1.4",
                  "body": [
                    {
                      "type": "Container",
                      "style": "${{ steps.status.outputs.color }}",
                      "items": [
                        {
                          "type": "ColumnSet",
                          "columns": [
                            {
                              "type": "Column",
                              "width": "auto",
                              "items": [
                                {
                                  "type": "Image",
                                  "url": "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png",
                                  "size": "Small",
                                  "style": "Person"
                                }
                              ]
                            },
                            {
                              "type": "Column",
                              "width": "stretch",
                              "items": [
                                {
                                  "type": "TextBlock",
                                  "text": "${{ steps.status.outputs.emoji }} ${{ steps.status.outputs.title }}",
                                  "weight": "Bolder",
                                  "size": "Large",
                                  "wrap": true
                                },
                                {
                                  "type": "TextBlock",
                                  "text": "${{ steps.status.outputs.message }}",
                                  "isSubtle": true,
                                  "wrap": true
                                }
                              ]
                            }
                          ]
                        }
                      ]
                    },
                    {
                      "type": "FactSet",
                      "facts": [
                        {
                          "title": "📦 Repository",
                          "value": "${{ github.repository }}"
                        },
                        {
                          "title": "🌿 Branch",
                          "value": "${{ github.ref_name }}"
                        },
                        {
                          "title": "👤 Triggered by",
                          "value": "${{ github.actor }}"
                        },
                        {
                          "title": "📝 Commit",
                          "value": "${{ github.event.head_commit.message }}"
                        },
                        {
                          "title": "🔢 Run number",
                          "value": "#${{ github.run_number }}"
                        },
                        {
                          "title": "🕐 Time (SL)",
                          "value": "'"$(TZ='Asia/Colombo' date '+%Y-%m-%d %H:%M:%S')"'"
                        }
                      ]
                    }
                  ],
                  "actions": [
                    {
                      "type": "Action.OpenUrl",
                      "title": "🔍 View Run Logs",
                      "url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    },
                    {
                      "type": "Action.OpenUrl",
                      "title": "🌐 Open Live Site",
                      "url": "https://drivestreams.netlify.app"
                    },
                    {
                      "type": "Action.OpenUrl",
                      "title": "📂 View Commit",
                      "url": "https://github.com/${{ github.repository }}/commit/${{ github.sha }}"
                    }
                  ]
                }
              }
            ]
          }'