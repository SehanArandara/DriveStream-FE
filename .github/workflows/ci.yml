name: React CI/CD Pipeline

on:
  push:
    branches: [main, develop, cicd-pipeline]
  pull_request:
    branches: [main, develop, cicd-pipeline]

jobs:

  # ─────────────────────────────
  # 1. INSTALL DEPENDENCIES
  # ─────────────────────────────
  install:
    name: 📦 Install Dependencies
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"

      - name: Install dependencies
        run: npm ci

  # ─────────────────────────────
  # 2. LINT (NON-BLOCKING)
  # ─────────────────────────────
  lint:
    name: 🔍 Lint
    runs-on: ubuntu-latest
    needs: install

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint
        continue-on-error: true

  # ─────────────────────────────
  # 3. TEST
  # ─────────────────────────────
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest
    needs: install

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run Tests
        run: npm run test -- --run

  # ─────────────────────────────
  # 4. COVERAGE
  # ─────────────────────────────
  coverage:
    name: 📊 Coverage
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run Coverage
        run: npm run test -- --run --coverage
        continue-on-error: true

  # ─────────────────────────────
  # 5. BUILD
  # ─────────────────────────────
  build:
    name: 🏗️ Build App
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: dist/
          retention-days: 7

  # ─────────────────────────────
  # 6. MANUAL APPROVAL
  # ─────────────────────────────
  approval:
    name: 🔐 Approval Gate
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: production

    steps:
      - name: Approval Step
        run: echo "Approved. Ready for deployment."

  # ─────────────────────────────
  # 7. DEPLOY (NETLIFY)
  # ─────────────────────────────
  deploy:
    name: Deploy to Netlify
    runs-on: ubuntu-latest
    needs: approval

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: dist/

      - name: Install Netlify CLI
        run: npm install -g netlify-cli

      - name: Deploy to Netlify
        run: netlify deploy --prod --dir=dist --no-build  
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}